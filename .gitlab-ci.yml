---
default:
  interruptible: true

stages:
  - install
  - build
  - publish

include:
  - project: devops/pipelines
    ref: go@1.6.0
    file:
      - /go/install.gitlab-ci.yml
      - /go/lint.gitlab-ci.yml
      - /go/build.gitlab-ci.yml
      - /go/test.gitlab-ci.yml
    inputs:
      version: 1.25-alpine
  - project: devops/pipelines
    ref: semantic-release@1.6.1
    file:
      - /semantic-release/publish.gitlab-ci.yml

install:
  stage: install
  extends:
    - .go-install

lint:
  stage: build
  extends:
    - .go-lint

test:
  stage: build
  extends:
    - .go-test

build:
  stage: build
  extends:
    - .go-build

publish:
  stage: publish
  extends:
    - .semantic-release
